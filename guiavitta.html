<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Receitas Social — Guia Vitta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500&family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #2b1d1a;
  --bg-soft:   #392924;
  --cream:     #fdf8f3;
  --cream2:    #f4ebe1;
  --rose:      #d4849a;
  --rose-dark: #b06080;
  --gold:      #c9a44a;
  --terracota: #b5573f;
  --terracota-bg: rgba(181,87,63,.14);
  --green:     #6a9c5a;
  --ink:       #2b1d1a;
  --ink-soft:  #6b5a52;
  --ink-faint: #a3938a;
  --trans:     .2s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Comfortaa',sans-serif;
  background:var(--bg);
  background-image: radial-gradient(ellipse 70% 50% at 15% 0%, rgba(212,132,154,.10) 0%, transparent 60%);
  color:var(--cream);
  min-height:100vh;
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(253,248,243,.15); border-radius:3px; }

.shell { display:flex; min-height:100vh; }

/* ── SIDEBAR ── */
.shelf {
  width:228px; flex-shrink:0; background:var(--bg-soft);
  border-right:1px solid rgba(253,248,243,.08);
  display:flex; flex-direction:column;
  position:fixed; top:0; bottom:0; left:0; z-index:20;
}
.shelf-brand { padding:26px 24px 16px; }
.shelf-brand .mark { font-family:'Playfair Display',serif; font-style:italic; font-weight:600; font-size:1.4rem; color:var(--rose); line-height:1; }
.shelf-brand .sub { font-size:.62rem; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-faint); margin-top:6px; }

.client-fixed { padding:0 18px 14px; display:flex; align-items:center; gap:10px; }
.client-fixed .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.client-fixed .name { font-size:.92rem; font-weight:700; color:var(--cream); }
.client-fixed .switch-link { display:block; font-size:.66rem; color:var(--ink-faint); margin-top:2px; text-decoration:none; }
.client-fixed .switch-link:hover { color:var(--rose); }

.shelf-divider { height:1px; background:rgba(253,248,243,.08); margin:6px 18px 10px; }

.shelf-nets { padding:0 14px; display:flex; flex-direction:column; gap:4px; flex:1; }
.net-btn {
  display:flex; align-items:center; gap:11px; padding:11px 12px;
  border-radius:12px; border:none; background:none; cursor:pointer;
  color:rgba(253,248,243,.55); font-family:'Comfortaa',sans-serif;
  font-size:.84rem; font-weight:600; text-align:left; width:100%;
  transition:var(--trans); position:relative;
}
.net-btn:hover { background:rgba(253,248,243,.05); color:var(--cream); }
.net-btn.active { background:rgba(212,132,154,.16); color:var(--cream); }
.net-btn.active::before { content:''; position:absolute; left:0; top:10%; bottom:10%; width:3px; background:var(--rose); border-radius:0 3px 3px 0; }
.net-icon { width:19px; height:19px; flex-shrink:0; opacity:.9; }
.net-soon { margin-left:auto; font-size:.56rem; letter-spacing:.5px; text-transform:uppercase; color:var(--ink-faint); background:rgba(253,248,243,.06); padding:3px 7px; border-radius:6px; }

.shelf-foot { padding:16px 22px; border-top:1px solid rgba(253,248,243,.08); }
.shelf-foot .label { font-size:.6rem; letter-spacing:1px; text-transform:uppercase; color:var(--ink-faint); margin-bottom:4px; }
.shelf-foot .val { font-size:.78rem; color:rgba(253,248,243,.7); }

/* ── MAIN ── */
.main { margin-left:228px; flex:1; min-height:100vh; display:flex; flex-direction:column; }
.topbar { padding:26px 34px 16px; display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:14px; }
.topbar h1 { font-family:'Playfair Display',serif; font-weight:600; font-size:1.85rem; color:var(--cream); }
.topbar .net-label { font-size:.76rem; color:var(--rose); letter-spacing:.4px; margin-top:4px; }

.toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.btn { font-family:'Comfortaa',sans-serif; font-size:.8rem; font-weight:700; padding:9px 16px; border-radius:999px; border:1.5px solid rgba(253,248,243,.18); background:transparent; color:var(--cream); cursor:pointer; transition:var(--trans); display:inline-flex; align-items:center; gap:6px; }
.btn:hover { background:rgba(253,248,243,.06); border-color:rgba(253,248,243,.3); }
.btn-prim { background:var(--rose); border-color:var(--rose); color:#2b1620; }
.btn-prim:hover { background:var(--rose-dark); border-color:var(--rose-dark); color:var(--cream); }
.chip-filter { font-size:.72rem; font-weight:700; padding:7px 13px; border-radius:999px; border:1px solid rgba(253,248,243,.15); background:transparent; color:rgba(253,248,243,.6); cursor:pointer; transition:var(--trans); }
.chip-filter.active { background:var(--cream); color:var(--ink); border-color:var(--cream); }

.late-banner { margin:0 34px 4px; padding:14px 18px; border-radius:14px; background:var(--terracota-bg); border:1px solid rgba(181,87,63,.4); display:none; align-items:center; gap:12px; }
.late-banner.show { display:flex; }
.late-banner .ic { font-size:1.25rem; line-height:1; }
.late-banner .txt strong { color:var(--terracota); font-size:.86rem; }
.late-banner .txt span { display:block; font-size:.72rem; color:rgba(253,248,243,.6); margin-top:2px; }

.board-wrap { flex:1; padding:14px 34px 40px; overflow-x:auto; }
.board { display:grid; grid-template-columns:repeat(4, minmax(240px,1fr)); gap:16px; min-width:920px; }
.col { background:rgba(253,248,243,.03); border-radius:20px; padding:14px; display:flex; flex-direction:column; gap:10px; min-height:240px; }
.col-head { display:flex; align-items:center; justify-content:space-between; padding:4px 8px 8px; font-size:.72rem; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:rgba(253,248,243,.45); }
.col-head .n { background:rgba(253,248,243,.08); padding:2px 9px; border-radius:999px; color:var(--cream); }

.ficha { background:var(--cream); border-radius:14px; position:relative; padding:14px 16px 14px 20px; cursor:pointer; transition:var(--trans); box-shadow:0 2px 8px rgba(20,12,10,.18); }
.ficha:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(20,12,10,.3); }
.ficha::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:5px; border-radius:0 4px 4px 0; background:var(--marker, var(--rose)); }
.ficha.late { background:#fdf1ec; }
.ficha.late::before { background:var(--terracota); }
.ficha-late-flag { display:flex; align-items:center; gap:5px; font-size:.64rem; font-weight:700; color:var(--terracota); margin-bottom:6px; text-transform:uppercase; letter-spacing:.3px; }
.ficha-tag { display:inline-block; font-size:.6rem; font-weight:700; padding:3px 9px; border-radius:999px; margin-bottom:8px; letter-spacing:.2px; }
.ficha-tema { font-family:'Playfair Display',serif; font-size:.91rem; font-weight:600; color:var(--ink); line-height:1.35; }
.ficha-meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:9px; font-size:.66rem; color:var(--ink-soft); }
.ficha-meta b { color:var(--ink); }
.ficha-foot { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:9px; border-top:1px dashed rgba(43,29,26,.15); }
.sched-dot { display:flex; align-items:center; gap:5px; font-size:.64rem; font-weight:700; }
.sched-dot.on { color:var(--green); }
.sched-dot.off { color:var(--ink-faint); }
.fmt-pill { font-size:.6rem; font-weight:700; color:var(--ink-soft); background:rgba(43,29,26,.06); padding:3px 8px; border-radius:6px; }

.empty-col { text-align:center; padding:30px 10px; color:rgba(253,248,243,.3); font-size:.76rem; }
.loading-col { text-align:center; padding:30px 10px; color:rgba(253,248,243,.3); font-size:.76rem; }

.overlay { position:fixed; inset:0; background:rgba(15,9,8,.6); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px; }
.modal { background:var(--cream); border-radius:22px; width:min(560px,100%); max-height:88vh; overflow-y:auto; padding:30px 32px; box-shadow:0 30px 80px rgba(0,0,0,.4); color:var(--ink); }
.modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:6px; }
.modal-head h2 { font-family:'Playfair Display',serif; font-size:1.22rem; font-weight:600; line-height:1.3; }
.modal .close-x { background:none; border:none; font-size:1.2rem; color:var(--ink-soft); cursor:pointer; line-height:1; }
.modal-sub { font-size:.76rem; color:var(--ink-soft); margin-bottom:18px; }
.modal-alert { display:flex; gap:9px; align-items:center; background:var(--terracota-bg); border:1px solid rgba(181,87,63,.35); color:var(--terracota); border-radius:12px; padding:10px 14px; font-size:.76rem; font-weight:600; margin-bottom:16px; }
.fld { margin-bottom:16px; }
.fld label { display:block; font-size:.66rem; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-faint); font-weight:700; margin-bottom:6px; }
.fld .static-box { font-size:.83rem; line-height:1.6; background:rgba(43,29,26,.04); border-radius:10px; padding:11px 13px; color:var(--ink); white-space:pre-wrap; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
input[type=text], input[type=date], input[type=time], textarea, select { width:100%; font-family:'Comfortaa',sans-serif; font-size:.85rem; color:var(--ink); border:1.5px solid rgba(43,29,26,.15); border-radius:10px; padding:10px 12px; background:#fff; outline:none; transition:var(--trans); }
input:focus, textarea:focus, select:focus { border-color:var(--rose); }
textarea { resize:vertical; min-height:64px; font-family:'Comfortaa',sans-serif; }
.check-line { display:flex; align-items:center; gap:9px; padding:11px 0; border-top:1px dashed rgba(43,29,26,.15); font-size:.83rem; font-weight:600; }
.check-line input { width:auto; accent-color:var(--rose-dark); }
.modal-actions { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.modal-actions .btn { color:var(--ink); border-color:rgba(43,29,26,.18); }
.modal-actions .btn:hover { background:rgba(43,29,26,.05); }
.modal-actions .btn-prim { color:#2b1620; }
.copy-briefing-btn { background:var(--gold); border-color:var(--gold); color:#2b1620; flex:1; justify-content:center; }
.copy-briefing-btn:hover { background:#b8923d; border-color:#b8923d; }
.copy-briefing-btn.copied { background:var(--green); border-color:var(--green); color:#fff; }

.soon-wrap { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:60px 30px; gap:10px; }
.soon-wrap .ic { font-size:2.2rem; }
.soon-wrap h2 { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:600; }
.soon-wrap p { font-size:.85rem; color:rgba(253,248,243,.55); max-width:380px; line-height:1.6; }

.config-banner { margin:20px 34px; padding:18px 22px; border-radius:16px; background:rgba(212,132,154,.1); border:1px solid rgba(212,132,154,.3); font-size:.84rem; line-height:1.7; }
.config-banner code { background:rgba(0,0,0,.25); padding:2px 7px; border-radius:6px; font-size:.78em; }
.config-banner input { margin-top:10px; }

/* ── VIEW TOGGLE ── */
.view-toggle { display:flex; gap:3px; background:rgba(253,248,243,.07); border-radius:10px; padding:3px; }
.view-btn { font-family:'Comfortaa',sans-serif; font-size:.74rem; font-weight:700; padding:6px 13px; border-radius:7px; border:none; background:none; color:rgba(253,248,243,.4); cursor:pointer; transition:var(--trans); }
.view-btn.active { background:rgba(253,248,243,.13); color:var(--cream); }

/* ── MIX DE CONTEÚDO ── */
.mix-strip { padding:0 34px 18px; }
.mix-header { display:flex; align-items:center; gap:9px; margin-bottom:10px; }
.mix-title { font-size:.6rem; font-weight:700; letter-spacing:.9px; text-transform:uppercase; color:rgba(253,248,243,.3); margin-right:4px; }
.mix-month-label { font-size:.8rem; font-weight:700; color:var(--cream); }
.mix-nav-btn { background:none; border:none; color:rgba(253,248,243,.35); font-size:1rem; cursor:pointer; padding:1px 6px; transition:var(--trans); border-radius:6px; line-height:1; }
.mix-nav-btn:hover { color:var(--cream); background:rgba(253,248,243,.07); }
.mix-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.mix-card { background:rgba(253,248,243,.04); border-radius:14px; padding:13px 15px; border:1px solid rgba(253,248,243,.07); }
.mix-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; margin-bottom:9px; }
.mix-pilar-name { font-size:.67rem; font-weight:700; line-height:1.35; }
.mix-pct-badge { font-size:.58rem; color:rgba(253,248,243,.38); background:rgba(253,248,243,.07); padding:2px 7px; border-radius:999px; white-space:nowrap; flex-shrink:0; }
.mix-nums { display:flex; gap:14px; margin-bottom:9px; }
.mix-num .n { font-size:1.1rem; font-weight:700; line-height:1; }
.mix-num .n sub { font-size:.65em; font-weight:400; opacity:.45; }
.mix-num .l { font-size:.58rem; color:rgba(253,248,243,.38); margin-top:3px; }
.mix-bar-track { height:4px; background:rgba(253,248,243,.09); border-radius:2px; overflow:hidden; margin-bottom:7px; }
.mix-bar-fill { height:100%; border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.mix-status { font-size:.62rem; font-weight:600; }
.mix-status.ok { color:var(--green); }
.mix-status.warn { color:var(--gold); }
.mix-status.under { color:rgba(253,248,243,.3); }

/* ── CALENDÁRIO ── */
.cal-wrap { padding:14px 34px 40px; }
.cal-nav { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.cal-nav h3 { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:600; }
.cal-nav-btn { background:none; border:1px solid rgba(253,248,243,.15); color:rgba(253,248,243,.65); border-radius:8px; padding:5px 14px; font-size:.76rem; font-family:'Comfortaa',sans-serif; font-weight:600; cursor:pointer; transition:var(--trans); }
.cal-nav-btn:hover { background:rgba(253,248,243,.07); color:var(--cream); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.cal-dow { text-align:center; font-size:.59rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:rgba(253,248,243,.28); padding:4px 0 10px; }
.cal-day { background:rgba(253,248,243,.03); border-radius:10px; min-height:86px; padding:7px 8px; border:1px solid rgba(253,248,243,.05); overflow:hidden; }
.cal-day.today { border-color:rgba(212,132,154,.5); background:rgba(212,132,154,.06); }
.cal-day.other-month { opacity:.28; pointer-events:none; }
.cal-day-num { font-size:.68rem; font-weight:700; color:rgba(253,248,243,.42); margin-bottom:5px; }
.cal-day.today .cal-day-num { color:var(--rose); }
.cal-post-pill { display:block; font-size:.58rem; font-weight:600; padding:3px 6px; border-radius:5px; margin-bottom:3px; cursor:pointer; transition:filter .15s; color:#fff; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.cal-post-pill:hover { filter:brightness(1.2); }
.cal-more { font-size:.57rem; color:rgba(253,248,243,.32); padding-top:1px; }

/* ── LEGEND DO CALENDÁRIO ── */
.cal-legend { display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
.cal-legend-item { display:flex; align-items:center; gap:6px; font-size:.65rem; color:rgba(253,248,243,.5); }
.cal-legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.cal-legend-note { font-size:.6rem; color:rgba(253,248,243,.28); margin-left:auto; font-style:italic; }
.cal-story-pill { border:1px dashed rgba(255,255,255,.4) !important; }

/* ── RELATÓRIOS ── */
.rel-wrap { padding:14px 34px 40px; }
.rel-section { margin-bottom:28px; }
.rel-section-title { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:600; color:var(--cream); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid rgba(253,248,243,.1); }
.rel-pilar-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.rel-card { background:rgba(253,248,243,.04); border-radius:16px; padding:16px 18px; border:1px solid rgba(253,248,243,.07); }
.rel-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.rel-pilar-name { font-size:.78rem; font-weight:700; }
.rel-meta-badge { font-size:.6rem; background:rgba(253,248,243,.08); padding:3px 9px; border-radius:999px; color:rgba(253,248,243,.4); }
.rel-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:10px; text-align:center; }
.rel-stat-n { font-size:1.1rem; font-weight:700; line-height:1; }
.rel-stat-l { font-size:.54rem; color:rgba(253,248,243,.35); margin-top:3px; text-transform:uppercase; letter-spacing:.3px; }
.rel-bar-track { height:5px; background:rgba(253,248,243,.09); border-radius:3px; overflow:hidden; margin-bottom:8px; }
.rel-bar-fill { height:100%; border-radius:3px; transition:width .5s; }
.rel-desc { font-size:.68rem; color:rgba(253,248,243,.4); line-height:1.55; }
.rel-overview { display:flex; gap:18px; flex-wrap:wrap; background:rgba(253,248,243,.04); border-radius:16px; padding:18px 22px; border:1px solid rgba(253,248,243,.07); }
.rel-ov-item { display:flex; flex-direction:column; gap:4px; }
.rel-ov-n { font-size:1.35rem; font-weight:700; line-height:1; }
.rel-ov-l { font-size:.6rem; color:rgba(253,248,243,.38); text-transform:uppercase; letter-spacing:.4px; }
.rel-matrix-table { width:100%; border-collapse:collapse; margin-top:14px; }
.rel-matrix-table th { font-size:.6rem; letter-spacing:.6px; text-transform:uppercase; color:rgba(253,248,243,.3); font-weight:700; padding:8px 12px; text-align:left; border-bottom:1px solid rgba(253,248,243,.08); }
.rel-matrix-table td { font-size:.78rem; padding:10px 12px; border-bottom:1px solid rgba(253,248,243,.05); color:rgba(253,248,243,.72); vertical-align:top; }
.rel-matrix-table tr:last-child td { border-bottom:none; }
.rel-pilar-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; vertical-align:middle; }
.rhythm-row { display:flex; gap:10px; }
.rhythm-day { flex:1; background:rgba(253,248,243,.04); border-radius:14px; padding:14px 14px 12px; border:1px solid rgba(253,248,243,.07); display:flex; flex-direction:column; gap:6px; min-width:0; }
.rhythm-day.optional { border-style:dashed; opacity:.72; }
.rhythm-dow { font-size:.58rem; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:rgba(253,248,243,.32); }
.rhythm-pilar-tag { display:inline-block; font-size:.65rem; font-weight:700; padding:3px 9px; border-radius:999px; color:#fff; line-height:1.4; }
.rhythm-role { font-size:.68rem; color:rgba(253,248,243,.55); line-height:1.5; }
.rhythm-logic { font-size:.6rem; color:rgba(253,248,243,.28); line-height:1.45; font-style:italic; border-top:1px solid rgba(253,248,243,.06); padding-top:6px; margin-top:2px; }
.rhythm-mantra { font-size:.72rem; color:rgba(253,248,243,.4); line-height:1.6; padding:12px 16px; background:rgba(253,248,243,.03); border-radius:10px; border:1px solid rgba(253,248,243,.06); margin-top:4px; text-align:center; font-style:italic; }

@media (max-width:860px) {
  .shelf { width:0; overflow:hidden; }
  .main { margin-left:0; }
  .topbar, .board-wrap, .late-banner, .config-banner { padding-left:18px; padding-right:18px; margin-left:0; margin-right:0; }
}
</style>
</head>
<body>

<div class="shell">

  <aside class="shelf">
    <div class="shelf-brand">
      <div class="mark">Caderno social</div>
      <div class="sub">Guia Vitta</div>
    </div>

    <div class="client-fixed" id="client-fixed"></div>

    <div class="shelf-divider"></div>

    <nav class="shelf-nets" id="net-nav"></nav>

    <div class="shelf-foot">
      <div class="label">Próxima fase</div>
      <div class="val">Agendamento direto via Meta/Buffer</div>
    </div>
  </aside>

  <main class="main">

    <div id="board-view" style="display:none;">
      <div class="topbar">
        <div>
          <h1 id="page-title">Instagram</h1>
          <div class="net-label" id="page-sub"></div>
        </div>
        <div class="toolbar" id="filters"></div>
      </div>

      <div id="mix-strip" class="mix-strip"></div>

      <div class="late-banner" id="late-banner">
        <div class="ic">⏳</div>
        <div class="txt">
          <strong id="late-title"></strong>
          <span>Esses posts já passaram do horário planejado e ainda não foram marcados como publicados.</span>
        </div>
      </div>

/* ───────────────────────── HELPERS ───────────────────────── */

function fmtDateBR(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtTime(t) { return t ? t.slice(0,5) : ''; }

function isLate(post) {
  if (post.status === 'publicado') return false;
  const dt = new Date(post.data + 'T' + post.horario);
  return dt.getTime() < Date.now();
}
function lateLabel(post) {
  const dt = new Date(post.data + 'T' + post.horario);
  const diffH = Math.floor((Date.now() - dt.getTime()) / 3600000);
  if (diffH < 24) return diffH <= 0 ? 'atrasado' : diffH + 'h atrasado';
  const diffD = Math.floor(diffH/24);
  return diffD + (diffD>1?' dias':' dia') + ' atrasado';
}

function renderBoard() {

  let lateCount = 0;

  const posts = STATE.posts.filter(p => STATE.filter==='all' || p.pilar===STATE.filter);

  STATUSES.forEach(stage => {

    const items = posts.filter(p => p.status === stage.key)
      .sort((a,b) => (isLate(b)?1:0) - (isLate(a)?1:0));

    col.innerHTML = `<div class="col-head"><span>${stage.label}</span><span class="n">${items.length}</span></div>`;
    if (items.length === 0) col.innerHTML += `<div class="empty-col">Nenhum post aqui ainda</div>`;

    items.forEach(p => {
      const late = isLate(p);
      if (late) lateCount++;
      const color = PILAR_COLOR[p.pilar] || '#c9a44a';
      const card = document.createElement('div');
      card.className = 'ficha' + (late ? ' late' : '');
      card.style.setProperty('--marker', color);
      card.innerHTML = `
        ${late ? `<div class="ficha-late-flag">⏳ ${lateLabel(p)}</div>` : ''}

      col.appendChild(card);
    });

    board.appendChild(col);
  });

  const banner = document.getElementById('late-banner');
  if (lateCount > 0) {
    banner.classList.add('show');
    document.getElementById('late-title').textContent = lateCount === 1 ? '1 post atrasado' : lateCount + ' posts atrasados';
  } else {
    banner.classList.remove('show');
  }
}

/* ───────────────────────── BRIEFING PARA COPIAR ───────────────────────── */

function montarBriefingTexto(p) {
  const _redeId = p.rede_id || STATE.activeNet;
  const linhas = [
    `CLIENTE: ${clienteNome(STATE.activeClient)}`,
    `REDE: ${NETWORKS.find(n=>n.key===_redeId)?.label || _redeId}`,
    `DATA: ${fmtDateBR(p.data)} (${p.dia_semana || ''}) às ${fmtTime(p.horario)}`,
    `FORMATO: ${p.formato}`,
    `PILAR: ${p.pilar}`,
    `TEMA: ${p.tema}`,
  ];
  if (p.objetivo) linhas.push(`OBJETIVO: ${p.objetivo}`);
  if (p.cta) linhas.push(`CTA PRINCIPAL: ${p.cta}`);
  if (p.hashtags) linhas.push(`HASHTAGS: ${p.hashtags}`);
  linhas.push('');
  linhas.push('BRIEFING VISUAL:');
  linhas.push(p.briefing_visual || '(sem briefing visual cadastrado ainda)');
  if (p.story_apoio) {
    linhas.push('');
    linhas.push('STORY DE APOIO:');
    linhas.push(p.story_apoio);
  }
  return linhas.join('\n');
}

async function copiarBriefing(postId, btn) {
  const post = STATE.allPosts.find(p => p.id === postId) || STATE.posts.find(p => p.id === postId);
  const texto = montarBriefingTexto(post);
  try {
    await navigator.clipboard.writeText(texto);
    btn.textContent = '✓ Briefing copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar briefing'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    alert('Não foi possível copiar automaticamente. Texto do briefing:\n\n' + texto);
  }
}

  const isNew = !postId;
  const post = isNew

    : (STATE.allPosts.find(p => p.id === postId) || STATE.posts.find(p => p.id === postId));

  const late = !isNew && isLate(post);
  const _redeId = isNew ? STATE.activeNet : (post.rede_id || STATE.activeNet);

      ${late ? `<div class="modal-alert">⏳ Este post está ${lateLabel(post)}. Atualize a data ou marque como publicado.</div>` : ''}

      <div class="fld">

        <textarea id="m-tema" placeholder="Ex: 5 erros que você comete ao precificar">${post.tema}</textarea>

      </div>

      <div class="row2">
        <div class="fld">
          <label>Formato</label>
          <input type="text" id="m-formato" value="${post.formato || ''}" placeholder="Carrossel, Reel, Post estático...">
        </div>
        <div class="fld">
          <label>Pilar de conteúdo</label>
          <select id="m-pilar">
            ${Object.keys(PILAR_COLOR).map(p => `<option ${p===post.pilar?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="fld"><label>Objetivo</label><input type="text" id="m-objetivo" value="${post.objetivo || ''}" placeholder="Objetivo de negócio desse post"></div>
      <div class="fld"><label>CTA principal</label><input type="text" id="m-cta" value="${post.cta || ''}" placeholder="Ex: Link na bio para testar grátis"></div>
      <div class="fld"><label>Hashtags principais</label><input type="text" id="m-hashtags" value="${post.hashtags || ''}" placeholder="#Marca #Nicho ..."></div>

      <div class="fld">
        <label>Briefing visual (para o Claude Design)</label>
        <textarea id="m-briefing" style="min-height:110px;" placeholder="Cole ou escreva aqui o briefing visual completo...">${post.briefing_visual || ''}</textarea>

      <div class="fld">
        <label>Legenda completa (cole aqui quando estiver pronta)</label>
        <textarea id="m-legenda" placeholder="Cole aqui a legenda final com SEO, CTA e hashtags...">${post.legenda || ''}</textarea>
      </div>

      <div class="fld">
        <label>Status</label>
        <select id="m-status">
          ${STATUSES.map(s => `<option value="${s.key}" ${s.key===post.status?'selected':''}>${s.label}</option>`).join('')}
        </select>
      </div>

      <label class="check-line">

      </label>

      <div class="modal-actions">
        ${!isNew ? '<button class="btn copy-briefing-btn" id="m-copy">📋 Copiar briefing</button>' : ''}

      <div class="modal-actions">

function renderMixStrip() {
  const strip = document.getElementById('mix-strip');
  if (!strip) return;

  const month = STATE.calMonth;
  const monthStr = new Date(year, month, 1).toLocaleDateString('pt-BR', { month:'long', year:'numeric' });

  const monthPosts = STATE.posts.filter(p => {
    const d = new Date(p.data + 'T00:00:00');
    return d.getFullYear() === year && d.getMonth() === month;
  });

  const cardsHTML = PLANEJAMENTO.map(pl => {
    const color = PILAR_COLOR[pl.pilar] || '#c9a44a';
    const planned = monthPosts.filter(p => p.pilar === pl.pilar).length;
    const published = monthPosts.filter(p => p.pilar === pl.pilar && p.status === 'publicado').length;
    const barPct = Math.min(100, Math.round((planned / pl.meta) * 100));
    let statusClass = 'under', statusText = 'nenhum planejado';
    if (planned >= pl.meta) { statusClass = 'ok'; statusText = '✓ meta atingida'; }
    else if (planned > 0) { statusClass = 'warn'; statusText = `${pl.meta - planned} ainda faltam`; }
    return `<div class="mix-card">
      <div class="mix-card-top">
        <span class="mix-pilar-name" style="color:${color}">${pl.pilar}</span>
        <span class="mix-pct-badge">${pl.pct}% do mix</span>
      </div>
      <div class="mix-nums">
        <div class="mix-num"><div class="n">${planned}<sub>/${pl.meta}</sub></div><div class="l">planejados</div></div>
        <div class="mix-num"><div class="n">${published}</div><div class="l">publicados</div></div>
      </div>
      <div class="mix-bar-track"><div class="mix-bar-fill" style="width:${barPct}%;background:${color}"></div></div>
      <div class="mix-status ${statusClass}">${statusText}</div>
    </div>`;
  }).join('');

  strip.innerHTML = `
    <div class="mix-header">
      <span class="mix-title">Planejamento</span>
      <button class="mix-nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="mix-month-label">${monthStr.charAt(0).toUpperCase() + monthStr.slice(1)}</span>
      <button class="mix-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="mix-cards">${cardsHTML}</div>
  `;
}

/* ───────────────────────── CALENDÁRIO ───────────────────────── */

function renderCalendarView() {
  const wrap = document.getElementById('cal-wrap');
  if (!wrap) return;
  const year = STATE.calYear;
  const month = STATE.calMonth;
  const monthStr = new Date(year, month, 1).toLocaleDateString('pt-BR', { month:'long', year:'numeric' });
  const today = new Date();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const dowLabels = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  // Apenas posts prontos para agendar e publicados, todos os canais
  const calPosts = STATE.allPosts.filter(p => p.status === 'pronto' || p.status === 'publicado');

  const itemsByDate = {};
  calPosts.forEach(p => {
    if (!itemsByDate[p.data]) itemsByDate[p.data] = [];
    itemsByDate[p.data].push({ type:'post', post:p });
    if (p.story_apoio && p.story_apoio.trim()) {
      itemsByDate[p.data].push({ type:'story', post:p });
    }
  });

  let dayEls = [];
  for (let i = firstDow - 1; i >= 0; i--) {
    dayEls.push(`<div class="cal-day other-month"><div class="cal-day-num">${daysInPrev - i}</div></div>`);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const dayItems = itemsByDate[dateStr] || [];
    const maxShow = 3;
    const pills = dayItems.slice(0, maxShow).map(item => {
      const color = PILAR_COLOR[item.post.pilar] || '#c9a44a';
      if (item.type === 'story') {
        return `<div class="cal-post-pill cal-story-pill" style="background:${color}44;" data-pid="${item.post.id}">📱 story</div>`;
      }
      const pub = item.post.status === 'publicado';
      return `<div class="cal-post-pill" style="background:${color}${pub?'88':'cc'};" data-pid="${item.post.id}">${pub ? '✓ ' : ''}${item.post.tema}</div>`;
    }).join('');
    const more = dayItems.length > maxShow ? `<div class="cal-more">+${dayItems.length - maxShow} mais</div>` : '';
    dayEls.push(`<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${pills}${more}</div>`);
  }
  const remaining = dayEls.length % 7 === 0 ? 0 : 7 - (dayEls.length % 7);
  for (let d = 1; d <= remaining; d++) {
    dayEls.push(`<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`);
  }

  wrap.innerHTML = `
    <div class="cal-wrap" style="padding:14px 34px 40px;">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹ anterior</button>
        <h3>${monthStr.charAt(0).toUpperCase() + monthStr.slice(1)}</h3>
        <button class="cal-nav-btn" onclick="changeMonth(1)">próximo ›</button>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(155,127,209,.8)"></div>Post pronto p/ agendar</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(155,127,209,.3);border:1px dashed rgba(255,255,255,.4)"></div>Story de apoio</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(106,156,90,.65)"></div>Publicado</div>
        <span class="cal-legend-note">Todos os canais · Pronto p/ agendar e Publicados</span>
      </div>
      <div class="cal-grid">
        ${dowLabels.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${dayEls.join('')}
      </div>
    </div>
  `;

  wrap.querySelectorAll('.cal-post-pill[data-pid]').forEach(pill => {
    const post = STATE.allPosts.find(p => String(p.id) === pill.dataset.pid);
    if (post) pill.addEventListener('click', () => openModal(post.id));
  });
}

function changeMonth(delta) {
  let m = STATE.calMonth + delta;
  let y = STATE.calYear;
  if (m < 0) { m = 11; y--; }
  if (m > 11) { m = 0; y++; }
  STATE.calMonth = m;
  STATE.calYear = y;
  if (STATE.view === 'kanban') renderMixStrip();
  if (STATE.view === 'calendar') renderCalendarView();
}

async function switchView(view) {
  STATE.view = view;
  await renderAll();
}

/* ───────────────────────── RELATÓRIOS ───────────────────────── */

function renderReportsView() {
  const wrap = document.getElementById('rel-wrap');
  if (!wrap) return;

  const all = STATE.allPosts;
  const total       = all.length;
  const totPlanejar  = all.filter(p => p.status === 'planejar').length;
  const totDesign    = all.filter(p => p.status === 'design').length;
  const totPronto    = all.filter(p => p.status === 'pronto').length;
  const totAgendado  = all.filter(p => p.agendado).length;
  const totPublicado = all.filter(p => p.status === 'publicado').length;

  const pilarStats = {};
  PLANEJAMENTO.forEach(pl => {
    pilarStats[pl.pilar] = { planejar:0, design:0, pronto:0, agendado:0, publicado:0 };
  });
  all.forEach(p => {
    const k = p.pilar;
    if (!pilarStats[k]) pilarStats[k] = { planejar:0, design:0, pronto:0, agendado:0, publicado:0 };
    if (p.status === 'planejar')  pilarStats[k].planejar++;
    if (p.status === 'design')    pilarStats[k].design++;
    if (p.status === 'pronto')    pilarStats[k].pronto++;
    if (p.agendado)               pilarStats[k].agendado++;
    if (p.status === 'publicado') pilarStats[k].publicado++;
  });

  const cardsHTML = PLANEJAMENTO.map(pl => {
    const color = PILAR_COLOR[pl.pilar] || '#c9a44a';
    const s = pilarStats[pl.pilar] || { planejar:0, design:0, pronto:0, agendado:0, publicado:0 };
    const filled = s.planejar + s.design + s.pronto + s.publicado;
    const barPct = Math.min(100, Math.round((filled / pl.meta) * 100));
    return `<div class="rel-card">
      <div class="rel-card-head">
        <span class="rel-pilar-name" style="color:${color}">${pl.pilar}</span>
        <span class="rel-meta-badge">${pl.pct}% do mix · meta ${pl.meta}</span>
      </div>
      <div class="rel-stats">
        <div><div class="rel-stat-n">${s.planejar}</div><div class="rel-stat-l">A planejar</div></div>
        <div><div class="rel-stat-n">${s.design}</div><div class="rel-stat-l">Produção</div></div>
        <div><div class="rel-stat-n">${s.pronto}</div><div class="rel-stat-l">Pronto</div></div>
        <div><div class="rel-stat-n" style="color:${color}">${s.agendado}</div><div class="rel-stat-l">Agendado</div></div>
        <div><div class="rel-stat-n" style="color:var(--green)">${s.publicado}</div><div class="rel-stat-l">Publicado</div></div>
      </div>
      <div class="rel-bar-track"><div class="rel-bar-fill" style="width:${barPct}%;background:${color}"></div></div>
      <div class="rel-desc">${pl.desc}</div>
    </div>`;
  }).join('');

  const matrixRowsHTML = PLANEJAMENTO.map(pl => {
    const color = PILAR_COLOR[pl.pilar] || '#c9a44a';
    return `<tr>
      <td><span class="rel-pilar-dot" style="background:${color}"></span>${pl.pilar}</td>
      <td style="font-weight:700">${pl.pct}%</td>
      <td>${pl.meta}</td>
      <td style="font-size:.72rem;color:rgba(253,248,243,.55)">${pl.desc}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <div class="rel-section">
      <div class="rel-section-title">Visão geral — todos os canais</div>
      <div class="rel-overview">
        <div class="rel-ov-item"><div class="rel-ov-n">${total}</div><div class="rel-ov-l">Total</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:rgba(253,248,243,.5)">${totPlanejar}</div><div class="rel-ov-l">A planejar</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:var(--gold)">${totDesign}</div><div class="rel-ov-l">Em produção</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:#9b7fd1">${totPronto}</div><div class="rel-ov-l">Pronto p/ agendar</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:var(--rose)">${totAgendado}</div><div class="rel-ov-l">Agendados</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:var(--green)">${totPublicado}</div><div class="rel-ov-l">Publicados</div></div>
      </div>
    </div>

    <div class="rel-section">
      <div class="rel-section-title">Desempenho por pilar</div>
      <div class="rel-pilar-grid">${cardsHTML}</div>
    </div>

    <div class="rel-section">
      <div class="rel-section-title">Matriz de pilares de conteúdo</div>
      <table class="rel-matrix-table">
        <thead><tr>
          <th>Pilar</th><th>% do mix</th><th>Meta mensal</th><th>Objetivo estratégico</th>
        </tr></thead>
        <tbody>${matrixRowsHTML}</tbody>
      </table>
    </div>

    <div class="rel-section">
      <div class="rel-section-title">Ritmo estratégico semanal</div>
      <div class="rhythm-row">
        <div class="rhythm-day">
          <div class="rhythm-dow">Segunda</div>
          <span class="rhythm-pilar-tag" style="background:#9b7fd1">Educação Profunda</span>
          <div class="rhythm-role">Abre a semana ensinando algo relevante</div>
          <div class="rhythm-logic">Atrai audiência fria, gera salvamentos e compartilhamentos — o combustível do alcance orgânico.</div>
        </div>
        <div class="rhythm-day">
          <div class="rhythm-dow">Terça</div>
          <span class="rhythm-pilar-tag" style="background:#9b7fd1">Educação Profunda</span>
          <div class="rhythm-role">Aprofunda ou complementa o tema de segunda</div>
          <div class="rhythm-logic">Quem salvou ontem volta pra ver mais. Você dobra a autoridade antes de qualquer CTA.</div>
        </div>
        <div class="rhythm-day optional">
          <div class="rhythm-dow">Quarta <span style="font-size:.55rem;opacity:.6">(quando existe)</span></div>
          <span class="rhythm-pilar-tag" style="background:#d18b5a">Bastidores</span>
          <div class="rhythm-role">Pilar de transição — humaniza a marca</div>
          <div class="rhythm-logic">Quebra o ritmo técnico, cria afinidade. Mantém quem já segue engajado sem forçar venda.</div>
        </div>
        <div class="rhythm-day">
          <div class="rhythm-dow">Quinta</div>
          <span class="rhythm-pilar-tag" style="background:#5aa68f">Prova Social</span>
          <div class="rhythm-role">Mostra resultado de quem já aplicou o conhecimento</div>
          <div class="rhythm-logic">A audiência foi educada nos dias anteriores. Agora vê prova de que funciona — fricção cai.</div>
        </div>
        <div class="rhythm-day">
          <div class="rhythm-dow">Sexta</div>
          <span class="rhythm-pilar-tag" style="background:#d4849a">Venda Direta</span>
          <div class="rhythm-role">Fecha a semana convertendo quem foi aquecido</div>
          <div class="rhythm-logic">O CTA chega depois de educar, provar e humanizar — a audiência já está convencida.</div>
        </div>
      </div>
      <div class="rhythm-mantra">Educação atrai · Prova converte · Bastidores retém</div>
    </div>
  `;
}
