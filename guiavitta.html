<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Receitas Social — Guia Vitta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500&family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #2b1d1a;
  --bg-soft:   #392924;
  --cream:     #fdf8f3;
  --cream2:    #f4ebe1;
  --rose:      #d4849a;
  --rose-dark: #b06080;
  --gold:      #c9a44a;
  --terracota: #b5573f;
  --terracota-bg: rgba(181,87,63,.14);
  --green:     #6a9c5a;
  --ink:       #2b1d1a;
  --ink-soft:  #6b5a52;
  --ink-faint: #a3938a;
  --trans:     .2s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Comfortaa',sans-serif;
  background:var(--bg);
  background-image: radial-gradient(ellipse 70% 50% at 15% 0%, rgba(212,132,154,.10) 0%, transparent 60%);
  color:var(--cream);
  min-height:100vh;
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(253,248,243,.15); border-radius:3px; }

.shell { display:flex; min-height:100vh; }

/* ── SIDEBAR ── */
.shelf {
  width:228px; flex-shrink:0; background:var(--bg-soft);
  border-right:1px solid rgba(253,248,243,.08);
  display:flex; flex-direction:column;
  position:fixed; top:0; bottom:0; left:0; z-index:20;
}
.shelf-brand { padding:26px 24px 16px; }
.shelf-brand .mark { font-family:'Playfair Display',serif; font-style:italic; font-weight:600; font-size:1.4rem; color:var(--rose); line-height:1; }
.shelf-brand .sub { font-size:.62rem; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-faint); margin-top:6px; }

.client-fixed { padding:0 18px 14px; display:flex; align-items:center; gap:10px; }
.client-fixed .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.client-fixed .name { font-size:.92rem; font-weight:700; color:var(--cream); }
.client-fixed .switch-link { display:block; font-size:.66rem; color:var(--ink-faint); margin-top:2px; text-decoration:none; }
.client-fixed .switch-link:hover { color:var(--rose); }

.shelf-divider { height:1px; background:rgba(253,248,243,.08); margin:6px 18px 10px; }

.shelf-nets { padding:0 14px; display:flex; flex-direction:column; gap:4px; flex:1; }
.net-btn {
  display:flex; align-items:center; gap:11px; padding:11px 12px;
  border-radius:12px; border:none; background:none; cursor:pointer;
  color:rgba(253,248,243,.55); font-family:'Comfortaa',sans-serif;
  font-size:.84rem; font-weight:600; text-align:left; width:100%;
  transition:var(--trans); position:relative;
}
.net-btn:hover { background:rgba(253,248,243,.05); color:var(--cream); }
.net-btn.active { background:rgba(212,132,154,.16); color:var(--cream); }
.net-btn.active::before { content:''; position:absolute; left:0; top:10%; bottom:10%; width:3px; background:var(--rose); border-radius:0 3px 3px 0; }
.net-icon { width:19px; height:19px; flex-shrink:0; opacity:.9; }
.net-soon { margin-left:auto; font-size:.56rem; letter-spacing:.5px; text-transform:uppercase; color:var(--ink-faint); background:rgba(253,248,243,.06); padding:3px 7px; border-radius:6px; }

.shelf-foot { padding:16px 22px; border-top:1px solid rgba(253,248,243,.08); }
.shelf-foot .label { font-size:.6rem; letter-spacing:1px; text-transform:uppercase; color:var(--ink-faint); margin-bottom:4px; }
.shelf-foot .val { font-size:.78rem; color:rgba(253,248,243,.7); }

/* ── MAIN ── */
.main { margin-left:228px; flex:1; min-height:100vh; display:flex; flex-direction:column; }
.topbar { padding:26px 34px 16px; display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:14px; }
.topbar h1 { font-family:'Playfair Display',serif; font-weight:600; font-size:1.85rem; color:var(--cream); }
.topbar .net-label { font-size:.76rem; color:var(--rose); letter-spacing:.4px; margin-top:4px; }

.toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.btn { font-family:'Comfortaa',sans-serif; font-size:.8rem; font-weight:700; padding:9px 16px; border-radius:999px; border:1.5px solid rgba(253,248,243,.18); background:transparent; color:var(--cream); cursor:pointer; transition:var(--trans); display:inline-flex; align-items:center; gap:6px; }
.btn:hover { background:rgba(253,248,243,.06); border-color:rgba(253,248,243,.3); }
.btn-prim { background:var(--rose); border-color:var(--rose); color:#2b1620; }
.btn-prim:hover { background:var(--rose-dark); border-color:var(--rose-dark); color:var(--cream); }
.chip-filter { font-size:.72rem; font-weight:700; padding:7px 13px; border-radius:999px; border:1px solid rgba(253,248,243,.15); background:transparent; color:rgba(253,248,243,.6); cursor:pointer; transition:var(--trans); }
.chip-filter.active { background:var(--cream); color:var(--ink); border-color:var(--cream); }

.late-banner { margin:0 34px 4px; padding:14px 18px; border-radius:14px; background:var(--terracota-bg); border:1px solid rgba(181,87,63,.4); display:none; align-items:center; gap:12px; }
.late-banner.show { display:flex; }
.late-banner .ic { font-size:1.25rem; line-height:1; }
.late-banner .txt strong { color:var(--terracota); font-size:.86rem; }
.late-banner .txt span { display:block; font-size:.72rem; color:rgba(253,248,243,.6); margin-top:2px; }

.board-wrap { flex:1; padding:14px 34px 40px; overflow-x:auto; }
.board { display:grid; grid-template-columns:repeat(8, minmax(195px,1fr)); gap:10px; min-width:1600px; }
.col { background:rgba(253,248,243,.03); border-radius:20px; padding:14px; display:flex; flex-direction:column; gap:10px; min-height:240px; }
.col-head { display:flex; align-items:center; justify-content:space-between; padding:4px 8px 8px; font-size:.72rem; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:rgba(253,248,243,.45); }
.col-head .n { background:rgba(253,248,243,.08); padding:2px 9px; border-radius:999px; color:var(--cream); }

.ficha { background:var(--cream); border-radius:14px; position:relative; padding:14px 16px 14px 20px; cursor:pointer; transition:var(--trans); box-shadow:0 2px 8px rgba(20,12,10,.18); }
.ficha:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(20,12,10,.3); }
.ficha::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:5px; border-radius:0 4px 4px 0; background:var(--marker, var(--rose)); }
.ficha.late { background:#fdf1ec; }
.ficha.late::before { background:var(--terracota); }
.ficha-late-flag { display:flex; align-items:center; gap:5px; font-size:.64rem; font-weight:700; color:var(--terracota); margin-bottom:6px; text-transform:uppercase; letter-spacing:.3px; }
.ficha-tag { display:inline-block; font-size:.6rem; font-weight:700; padding:3px 9px; border-radius:999px; margin-bottom:8px; letter-spacing:.2px; }
.ficha-tema { font-family:'Playfair Display',serif; font-size:.91rem; font-weight:600; color:var(--ink); line-height:1.35; }
.ficha-meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:9px; font-size:.66rem; color:var(--ink-soft); }
.ficha-meta b { color:var(--ink); }
.ficha-foot { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:9px; border-top:1px dashed rgba(43,29,26,.15); }
.ficha-cl { margin-top:8px; display:flex; align-items:center; gap:8px; }
.ficha-cl-track { flex:1; height:3px; background:rgba(43,29,26,.1); border-radius:2px; overflow:hidden; }
.ficha-cl-fill { height:100%; border-radius:2px; transition:width .4s; }
.ficha-cl-label { font-size:.58rem; font-weight:700; flex-shrink:0; }
.ficha-img { width:100%; height:68px; object-fit:cover; border-radius:8px; margin-bottom:8px; display:block; }
.ficha-actions { position:absolute; top:8px; right:8px; display:flex; gap:3px; opacity:0; transition:opacity .15s; z-index:2; }
.ficha:hover .ficha-actions { opacity:1; }
.ficha-act-btn { background:rgba(255,255,255,.92); border:none; border-radius:7px; padding:4px 7px; font-size:.8rem; cursor:pointer; line-height:1; box-shadow:0 1px 5px rgba(0,0,0,.14); transition:var(--trans); }
.ficha-act-btn:hover { background:#fff; transform:scale(1.1); }
.ficha-status-sel { background:rgba(255,255,255,.92); border:none; border-radius:7px; padding:3px 5px; font-size:.66rem; cursor:pointer; box-shadow:0 1px 5px rgba(0,0,0,.14); color:#2b1620; max-width:120px; }
.ficha-status-sel:hover { background:#fff; }
.sched-dot { display:flex; align-items:center; gap:5px; font-size:.64rem; font-weight:700; }
.sched-dot.on { color:var(--green); }
.sched-dot.off { color:var(--ink-faint); }
.fmt-pill { font-size:.6rem; font-weight:700; color:var(--ink-soft); background:rgba(43,29,26,.06); padding:3px 8px; border-radius:6px; }

.empty-col { text-align:center; padding:30px 10px; color:rgba(253,248,243,.3); font-size:.76rem; }
.loading-col { text-align:center; padding:30px 10px; color:rgba(253,248,243,.3); font-size:.76rem; }

.overlay { position:fixed; inset:0; background:rgba(15,9,8,.6); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px; }
.modal { background:var(--cream); border-radius:22px; width:min(720px,100%); max-height:90vh; overflow-y:auto; padding:28px 32px; box-shadow:0 30px 80px rgba(0,0,0,.4); color:var(--ink); }
.modal-tabs { display:flex; border-bottom:1px solid rgba(43,29,26,.12); margin:12px -32px 20px; padding:0 32px; overflow-x:auto; gap:0; }
.tab-btn { font-family:'Comfortaa',sans-serif; font-size:.7rem; font-weight:700; padding:10px 14px; border:none; background:none; cursor:pointer; color:rgba(43,29,26,.38); border-bottom:2px solid transparent; margin-bottom:-1px; transition:.15s; white-space:nowrap; flex-shrink:0; }
.tab-btn:hover { color:rgba(43,29,26,.65); }
.tab-btn.active { color:var(--rose); border-bottom-color:var(--rose); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.cl-progress-label { font-size:.62rem; color:var(--ink-faint); margin-bottom:6px; display:flex; justify-content:space-between; }
.cl-progress { height:5px; background:rgba(43,29,26,.1); border-radius:3px; overflow:hidden; margin-bottom:16px; }
.cl-progress-fill { height:100%; background:var(--green); border-radius:3px; transition:width .3s; }
.checklist-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; cursor:pointer; transition:var(--trans); }
.checklist-item:hover { background:rgba(43,29,26,.04); }
.checklist-item input[type=checkbox] { width:17px; height:17px; accent-color:var(--rose-dark); cursor:pointer; flex-shrink:0; }
.checklist-item span { font-size:.84rem; }
.checklist-item.done span { text-decoration:line-through; color:var(--ink-faint); }
.arquivo-item { display:flex; align-items:center; gap:10px; padding:10px 13px; background:rgba(43,29,26,.04); border-radius:10px; margin-bottom:7px; }
.arquivo-item a { font-size:.82rem; color:var(--rose-dark); text-decoration:none; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.arquivo-item a:hover { text-decoration:underline; }
.arquivo-tipo-badge { font-size:.58rem; color:var(--ink-faint); background:rgba(43,29,26,.1); padding:2px 8px; border-radius:6px; flex-shrink:0; }
.arquivo-del { background:none; border:none; color:var(--ink-faint); cursor:pointer; font-size:.95rem; padding:2px 6px; border-radius:6px; transition:var(--trans); }
.arquivo-del:hover { color:var(--terracota); background:rgba(181,87,63,.08); }
.add-arq-form { margin-top:14px; padding:14px; background:rgba(43,29,26,.03); border-radius:12px; border:1px dashed rgba(43,29,26,.12); display:flex; flex-direction:column; gap:8px; }
.add-arq-row { display:flex; gap:8px; }
.add-arq-row input { flex:1; }
.add-arq-row select { width:130px; flex-shrink:0; }
.tab-empty { text-align:center; padding:28px 10px; color:var(--ink-faint); font-size:.78rem; }
.arquivo-nome { font-size:.8rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink); }
.arquivo-item-img { flex-direction:column; align-items:stretch; padding:12px; }
.arquivo-preview-img { width:100%; height:90px; object-fit:cover; border-radius:8px; margin-bottom:8px; display:block; }
.arquivo-actions { display:flex; gap:5px; flex-shrink:0; }
.arquivo-action-btn { background:rgba(43,29,26,.06); border:none; border-radius:6px; padding:4px 9px; font-size:.66rem; cursor:pointer; color:var(--ink-soft); transition:var(--trans); text-decoration:none; display:inline-flex; align-items:center; }
.arquivo-action-btn:hover { background:rgba(43,29,26,.12); color:var(--ink); }
.upload-zone { border:2px dashed rgba(43,29,26,.15); border-radius:12px; padding:22px 20px; text-align:center; cursor:pointer; transition:var(--trans); margin-bottom:10px; }
.upload-zone:hover, .upload-zone.dv { border-color:var(--rose-dark); background:rgba(212,132,154,.05); }
.upload-zone-text { font-size:.76rem; color:rgba(43,29,26,.45); margin-top:5px; }
.upload-status { font-size:.74rem; text-align:center; padding:6px 0; color:var(--ink-soft); }
.modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:6px; }
.modal-head h2 { font-family:'Playfair Display',serif; font-size:1.22rem; font-weight:600; line-height:1.3; }
.modal .close-x { background:none; border:none; font-size:1.2rem; color:var(--ink-soft); cursor:pointer; line-height:1; }
.modal-sub { font-size:.76rem; color:var(--ink-soft); margin-bottom:18px; }
.modal-alert { display:flex; gap:9px; align-items:center; background:var(--terracota-bg); border:1px solid rgba(181,87,63,.35); color:var(--terracota); border-radius:12px; padding:10px 14px; font-size:.76rem; font-weight:600; margin-bottom:16px; }
.fld { margin-bottom:16px; }
.fld label { display:block; font-size:.66rem; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-faint); font-weight:700; margin-bottom:6px; }
.fld .static-box { font-size:.83rem; line-height:1.6; background:rgba(43,29,26,.04); border-radius:10px; padding:11px 13px; color:var(--ink); white-space:pre-wrap; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
input[type=text], input[type=date], input[type=time], textarea, select { width:100%; font-family:'Comfortaa',sans-serif; font-size:.85rem; color:var(--ink); border:1.5px solid rgba(43,29,26,.15); border-radius:10px; padding:10px 12px; background:#fff; outline:none; transition:var(--trans); }
input:focus, textarea:focus, select:focus { border-color:var(--rose); }
textarea { resize:vertical; min-height:64px; font-family:'Comfortaa',sans-serif; }
.check-line { display:flex; align-items:center; gap:9px; padding:11px 0; border-top:1px dashed rgba(43,29,26,.15); font-size:.83rem; font-weight:600; }
.check-line input { width:auto; accent-color:var(--rose-dark); }
.modal-actions { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.modal-actions .btn { color:var(--ink); border-color:rgba(43,29,26,.18); }
.modal-actions .btn:hover { background:rgba(43,29,26,.05); }
.modal-actions .btn-prim { color:#2b1620; }
.copy-briefing-btn { background:var(--gold); border-color:var(--gold); color:#2b1620; flex:1; justify-content:center; }
.copy-briefing-btn:hover { background:#b8923d; border-color:#b8923d; }
.copy-briefing-btn.copied { background:var(--green); border-color:var(--green); color:#fff; }

.soon-wrap { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:60px 30px; gap:10px; }
.soon-wrap .ic { font-size:2.2rem; }
.soon-wrap h2 { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:600; }
.soon-wrap p { font-size:.85rem; color:rgba(253,248,243,.55); max-width:380px; line-height:1.6; }

.config-banner { margin:20px 34px; padding:18px 22px; border-radius:16px; background:rgba(212,132,154,.1); border:1px solid rgba(212,132,154,.3); font-size:.84rem; line-height:1.7; }
.config-banner code { background:rgba(0,0,0,.25); padding:2px 7px; border-radius:6px; font-size:.78em; }
.config-banner input { margin-top:10px; }

/* ── VIEW TOGGLE ── */
.view-toggle { display:flex; gap:3px; background:rgba(253,248,243,.07); border-radius:10px; padding:3px; }
.view-btn { font-family:'Comfortaa',sans-serif; font-size:.74rem; font-weight:700; padding:6px 13px; border-radius:7px; border:none; background:none; color:rgba(253,248,243,.4); cursor:pointer; transition:var(--trans); }
.view-btn.active { background:rgba(253,248,243,.13); color:var(--cream); }

/* ── MIX DE CONTEÚDO ── */
.mix-strip { padding:0 34px 18px; }
.mix-header { display:flex; align-items:center; gap:9px; margin-bottom:10px; }
.mix-title { font-size:.6rem; font-weight:700; letter-spacing:.9px; text-transform:uppercase; color:rgba(253,248,243,.3); margin-right:4px; }
.mix-month-label { font-size:.8rem; font-weight:700; color:var(--cream); }
.mix-nav-btn { background:none; border:none; color:rgba(253,248,243,.35); font-size:1rem; cursor:pointer; padding:1px 6px; transition:var(--trans); border-radius:6px; line-height:1; }
.mix-nav-btn:hover { color:var(--cream); background:rgba(253,248,243,.07); }
.mix-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.mix-card { background:rgba(253,248,243,.04); border-radius:14px; padding:13px 15px; border:1px solid rgba(253,248,243,.07); }
.mix-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; margin-bottom:9px; }
.mix-pilar-name { font-size:.67rem; font-weight:700; line-height:1.35; }
.mix-pct-badge { font-size:.58rem; color:rgba(253,248,243,.38); background:rgba(253,248,243,.07); padding:2px 7px; border-radius:999px; white-space:nowrap; flex-shrink:0; }
.mix-nums { display:flex; gap:14px; margin-bottom:9px; }
.mix-num .n { font-size:1.1rem; font-weight:700; line-height:1; }
.mix-num .n sub { font-size:.65em; font-weight:400; opacity:.45; }
.mix-num .l { font-size:.58rem; color:rgba(253,248,243,.38); margin-top:3px; }
.mix-bar-track { height:4px; background:rgba(253,248,243,.09); border-radius:2px; overflow:hidden; margin-bottom:7px; }
.mix-bar-fill { height:100%; border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.mix-status { font-size:.62rem; font-weight:600; }
.mix-status.ok { color:var(--green); }
.mix-status.warn { color:var(--gold); }
.mix-status.under { color:rgba(253,248,243,.3); }

/* ── CALENDÁRIO ── */
.cal-wrap { padding:14px 34px 40px; }
.cal-nav { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.cal-nav h3 { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:600; }
.cal-nav-btn { background:none; border:1px solid rgba(253,248,243,.15); color:rgba(253,248,243,.65); border-radius:8px; padding:5px 14px; font-size:.76rem; font-family:'Comfortaa',sans-serif; font-weight:600; cursor:pointer; transition:var(--trans); }
.cal-nav-btn:hover { background:rgba(253,248,243,.07); color:var(--cream); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.cal-dow { text-align:center; font-size:.59rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:rgba(253,248,243,.28); padding:4px 0 10px; }
.cal-day { background:rgba(253,248,243,.03); border-radius:10px; min-height:86px; padding:7px 8px; border:1px solid rgba(253,248,243,.05); overflow:hidden; }
.cal-day.today { border-color:rgba(212,132,154,.5); background:rgba(212,132,154,.06); }
.cal-day.other-month { opacity:.28; pointer-events:none; }
.cal-day-num { font-size:.68rem; font-weight:700; color:rgba(253,248,243,.42); margin-bottom:5px; }
.cal-day.today .cal-day-num { color:var(--rose); }
.cal-post-pill { display:block; font-size:.58rem; font-weight:600; padding:3px 6px; border-radius:5px; margin-bottom:3px; cursor:pointer; transition:filter .15s; color:#fff; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.cal-post-pill:hover { filter:brightness(1.2); }
.cal-more { font-size:.57rem; color:rgba(253,248,243,.32); padding-top:1px; }

/* ── LEGEND DO CALENDÁRIO ── */
.cal-legend { display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
.cal-legend-item { display:flex; align-items:center; gap:6px; font-size:.65rem; color:rgba(253,248,243,.5); }
.cal-legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.cal-legend-note { font-size:.6rem; color:rgba(253,248,243,.28); margin-left:auto; font-style:italic; }
.cal-story-pill { border:1px dashed rgba(255,255,255,.4) !important; }

/* ── RELATÓRIOS ── */

/* ───────────────────────── HELPERS ───────────────────────── */

function fmtDateBR(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtTime(t) { return t ? t.slice(0,5) : ''; }

function normStatus(s) {
  const map = { 'planejar':'ideia', 'design':'producao', 'pronto':'agendar' };
  return map[s] || s;
}

function parseJSON(str, fallback) {
  try { return JSON.parse(str || 'null') ?? fallback; } catch { return fallback; }
}

function getChecklist(formato) {
  const key = Object.keys(CHECKLISTS).find(k => k.toLowerCase() === (formato||'').toLowerCase());
  return key ? CHECKLISTS[key] : CHECKLIST_DEFAULT;
}

function checklistProgress(post) {
  const items = getChecklist(post.formato || '');
  const done = parseJSON(post.checklist_done, {});
  const doneCount = items.filter(item => done[item]).length;
  const total = items.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  const color = pct === 100 ? '#6a9c5a' : pct >= 50 ? '#c9a44a' : 'rgba(43,29,26,.18)';
  if (doneCount === 0 && total > 0 && !post.checklist_done) return '';
  return `<div class="ficha-cl">
    <div class="ficha-cl-track"><div class="ficha-cl-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="ficha-cl-label" style="color:${color}">${doneCount}/${total}</span>
  </div>`;
}

function isLate(post) {
  if (post.status === 'publicado') return false;
  const dt = new Date(post.data + 'T' + post.horario);
  return dt.getTime() < Date.now();
}
function lateLabel(post) {
  const dt = new Date(post.data + 'T' + post.horario);
  const diffH = Math.floor((Date.now() - dt.getTime()) / 3600000);
  if (diffH < 24) return diffH <= 0 ? 'atrasado' : diffH + 'h atrasado';
  const diffD = Math.floor(diffH/24);
  return diffD + (diffD>1?' dias':' dia') + ' atrasado';
}

function clienteNome(id) {
  return CLIENTE_NOME;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  let lateCount = 0;

  const posts = STATE.posts.filter(p => STATE.filter==='all' || p.pilar===STATE.filter);

  STATUSES.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'col';
    col.style.borderTop = `2px solid ${stage.color}55`;
    const items = posts.filter(p => normStatus(p.status) === stage.key)
      .sort((a,b) => (isLate(b)?1:0) - (isLate(a)?1:0));

    col.innerHTML = `<div class="col-head" style="color:${stage.color}"><span>${stage.label}</span><span class="n" style="background:${stage.color}22;color:${stage.color}">${items.length}</span></div>`;
    if (items.length === 0) col.innerHTML += `<div class="empty-col">Nenhum post aqui ainda</div>`;

    items.forEach(p => {
      const late = isLate(p);
      if (late) lateCount++;
      const color = PILAR_COLOR[p.pilar] || '#c9a44a';
      const card = document.createElement('div');
      card.className = 'ficha' + (late ? ' late' : '');
      card.style.setProperty('--marker', color);
      const arqParsed = parseJSON(p.arquivos, []);
      const firstImg = arqParsed.find(a => isImageUrl(a.url));
      const curStatus = normStatus(p.status);
      card.innerHTML = `
        <div class="ficha-actions">
          ${p.legenda ? `<button class="ficha-act-btn" data-action="copy-leg" title="Copiar legenda">📋</button>` : ''}
          <select class="ficha-status-sel" title="Mover para etapa">
            ${STATUSES.map(s => `<option value="${s.key}" ${s.key===curStatus?'selected':''}>${s.label}</option>`).join('')}
          </select>
          ${curStatus==='agendar' && !p.agendado ? `<button class="ficha-act-btn" data-action="agendar" title="Marcar agendado">📅</button>` : ''}
        </div>
        ${firstImg ? `<img class="ficha-img" src="${firstImg.url}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        ${late ? `<div class="ficha-late-flag">⏳ ${lateLabel(p)}</div>` : ''}
        <span class="ficha-tag" style="background:${color}22; color:${color};">${p.pilar}</span>
        <div class="ficha-tema">${p.tema}</div>
        <div class="ficha-meta">
          <span>📅 <b>${p.dia_semana ? p.dia_semana.slice(0,3) : ''} ${fmtDateBR(p.data)}</b></span>
          <span>🕐 <b>${fmtTime(p.horario)}</b></span>
        </div>
        ${checklistProgress(p)}
        <div class="ficha-foot">
          <span class="fmt-pill">${p.formato}</span>
          <span class="sched-dot ${p.agendado?'on':'off'}">${p.agendado ? '● agendado' : '○ não agendado'}</span>
        </div>
      `;
      card.querySelectorAll('.ficha-act-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const action = btn.dataset.action;
          if (action === 'copy-leg') {
            try {
              await navigator.clipboard.writeText(p.legenda);
              btn.textContent = '✓';
              setTimeout(() => { btn.textContent = '📋'; }, 1500);
            } catch { alert(p.legenda); }
          } else if (action === 'agendar') {
            const { error } = await sb.from('posts').update({ agendado: true }).eq('id', p.id);
            if (!error) await renderAll();
          }
        });
      });
      const stSel = card.querySelector('.ficha-status-sel');
      if (stSel) {
        stSel.addEventListener('click', e => e.stopPropagation());
        stSel.addEventListener('change', async (e) => {
          e.stopPropagation();
          const newStatus = stSel.value;
          if (newStatus !== curStatus) {
            const { error } = await sb.from('posts').update({ status: newStatus }).eq('id', p.id);
            if (!error) await renderAll();
          }
        });
      }
      card.addEventListener('click', () => openModal(p.id));
      col.appendChild(card);
    });

    board.appendChild(col);
  });

  const banner = document.getElementById('late-banner');
  if (lateCount > 0) {
    banner.classList.add('show');
    document.getElementById('late-title').textContent = lateCount === 1 ? '1 post atrasado' : lateCount + ' posts atrasados';
  } else {
    banner.classList.remove('show');
  }
}

function montarBriefingTexto(p) {
  const _redeId = p.rede_id || STATE.activeNet;
  const linhas = [
    `CLIENTE: ${clienteNome(STATE.activeClient)}`,
    `REDE: ${NETWORKS.find(n=>n.key===_redeId)?.label || _redeId}`,
    `DATA: ${fmtDateBR(p.data)} (${p.dia_semana || ''}) às ${fmtTime(p.horario)}`,
    `FORMATO: ${p.formato}`,
    `PILAR: ${p.pilar}`,
    `TEMA: ${p.tema}`,
  ];
  if (p.objetivo) linhas.push(`OBJETIVO: ${p.objetivo}`);
  if (p.cta) linhas.push(`CTA PRINCIPAL: ${p.cta}`);
  if (p.hashtags) linhas.push(`HASHTAGS: ${p.hashtags}`);
  linhas.push('');
  linhas.push('BRIEFING VISUAL:');
  linhas.push(p.briefing_visual || '(sem briefing visual cadastrado ainda)');
  if (p.story_apoio) {
    linhas.push('');
    linhas.push('STORY DE APOIO:');
    linhas.push(p.story_apoio);
  }
  return linhas.join('\n');
}

async function copiarBriefing(postId, btn) {
  const post = STATE.allPosts.find(p => p.id === postId) || STATE.posts.find(p => p.id === postId);
  const texto = montarBriefingTexto(post);
  try {
    await navigator.clipboard.writeText(texto);
    btn.textContent = '✓ Briefing copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar briefing'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    alert('Não foi possível copiar automaticamente. Texto do briefing:\n\n' + texto);
  }
}

/* ───────────────────────── MODAL COM ABAS ───────────────────────── */

function isImageUrl(url) {
  return /\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(url);
}

async function uploadFiles(files, overlay) {
  if (!files.length) return;
  const statusEl = overlay.querySelector('#arq-status');
  statusEl.textContent = `Enviando ${files.length} arquivo(s)…`;
  statusEl.style.display = 'block';

  for (const file of files) {
    const postId = modalState.post?.id || 'novo';
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `${STATE.activeClient}/${postId}/${Date.now()}_${safeName}`;

    const { error } = await sb.storage.from('post-assets').upload(path, file, { upsert: true });
    if (error) { statusEl.textContent = `Erro: ${error.message}`; continue; }

    const { data: { publicUrl } } = sb.storage.from('post-assets').getPublicUrl(path);
    const tipo = file.type.startsWith('image/') ? 'Imagem'
      : file.type.startsWith('video/') ? 'Vídeo' : 'Documento';
    modalState.arquivos.push({ nome: file.name, url: publicUrl, tipo, path });
  }

  statusEl.style.display = 'none';
  renderArquivosTab(overlay);
}

function renderArquivosTab(overlay) {
  const container = overlay.querySelector('#tab-arquivos');
  const arqs = modalState.arquivos;

  const listHTML = arqs.map((a, i) => {
    const isImg = isImageUrl(a.url);
    const actions = `<div class="arquivo-actions">
      <a href="${a.url}" target="_blank" rel="noopener" class="arquivo-action-btn">Abrir</a>
      <a href="${a.url}" download="${a.nome||''}" class="arquivo-action-btn" title="Download">↓ Baixar</a>
      <button class="arquivo-del" data-idx="${i}" title="Remover">✕</button>
    </div>`;
    if (isImg) {
      return `<div class="arquivo-item arquivo-item-img">
        <img class="arquivo-preview-img" src="${a.url}" alt="${a.nome||''}" loading="lazy" onerror="this.style.display='none'">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="arquivo-tipo-badge">${a.tipo}</span>
          <span class="arquivo-nome">${a.nome||a.url}</span>
          ${actions}
        </div>
      </div>`;
    }
    return `<div class="arquivo-item">
      <span class="arquivo-tipo-badge">${a.tipo}</span>
      <span class="arquivo-nome">${a.nome||a.url}</span>
      ${actions}
    </div>`;
  }).join('');

  container.innerHTML = `
    ${arqs.length === 0 ? '<div class="tab-empty">Nenhum arquivo ainda. Faça upload ou adicione um link.</div>' : ''}
    <div id="arq-list">${listHTML}</div>

    <div class="upload-zone" id="arq-zone">
      <input type="file" id="arq-file" multiple accept="image/*,video/*,.pdf,.doc,.docx,.pptx,.ai,.psd" style="display:none">

    </div>
    <div id="arq-status" class="upload-status" style="display:none"></div>

    <details style="margin-top:8px">
      <summary style="font-size:.73rem;color:var(--ink-faint);cursor:pointer;padding:8px 2px;list-style:none">
        + Adicionar por link (Google Drive, Canva…)
      </summary>
      <div class="add-arq-form" style="margin-top:8px">
        <div class="fld" style="margin:0"><label>Nome do arquivo</label><input type="text" id="arq-nome" placeholder="Ex: Capa carrossel final"></div>

          <input type="text" id="arq-url" placeholder="Cole o link aqui">

            <option>Imagem</option><option>Vídeo</option><option>Capa</option>
            <option>Criativo final</option><option>Documento</option><option>Outro</option>
          </select>
        </div>
        <button class="btn btn-prim" id="arq-add" style="width:100%;justify-content:center;margin-top:4px">+ Adicionar link</button>
      </div>
    </details>`;

  container.querySelectorAll('.arquivo-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const arq = modalState.arquivos[idx];
      if (arq.path) sb.storage.from('post-assets').remove([arq.path]);
      modalState.arquivos.splice(idx, 1);
      renderArquivosTab(overlay);
    });
  });

  const zone = container.querySelector('#arq-zone');
  const fileInput = container.querySelector('#arq-file');
  zone.addEventListener('click', () => fileInput.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dv'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dv'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dv'); uploadFiles(Array.from(e.dataTransfer.files), overlay); });
  fileInput.addEventListener('change', () => uploadFiles(Array.from(fileInput.files), overlay));

  const addBtn = container.querySelector('#arq-add');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      const url = container.querySelector('#arq-url').value.trim();
      if (!url) return;
      modalState.arquivos.push({ nome: container.querySelector('#arq-nome').value.trim() || url, url, tipo: container.querySelector('#arq-tipo').value });
      renderArquivosTab(overlay);
    });
  }
}

function renderChecklistTab(overlay) {
  const container = overlay.querySelector('#tab-checklist');
  const formato = overlay.querySelector('#m-formato')?.value || '';
  const items = getChecklist(formato);
  const done = modalState.checklist;
  const doneCount = items.filter(item => done[item]).length;
  const pct = items.length ? Math.round((doneCount / items.length) * 100) : 0;

  container.innerHTML = `
    <div class="cl-progress-label">
      <span>${doneCount} de ${items.length} itens concluídos</span>
      <span>${pct}%</span>
    </div>
    <div class="cl-progress"><div class="cl-progress-fill" style="width:${pct}%"></div></div>
    ${items.map(item => `
      <label class="checklist-item ${done[item] ? 'done' : ''}" data-item="${encodeURIComponent(item)}">
        <input type="checkbox" ${done[item] ? 'checked' : ''} data-item="${encodeURIComponent(item)}">
        <span>${item}</span>
      </label>`).join('')}
    <div style="font-size:.62rem;color:var(--ink-faint);margin-top:14px;padding-top:10px;border-top:1px dashed rgba(43,29,26,.12)">
      Checklist para: <strong>${formato || 'formato não definido na aba Estratégia'}</strong>
    </div>`;

  container.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const item = decodeURIComponent(cb.dataset.item);
      modalState.checklist[item] = cb.checked;
      renderChecklistTab(overlay);
    });
  });
}

      horario:          overlay.querySelector('#m-time').value,
      formato:          overlay.querySelector('#m-formato').value,
      pilar:            overlay.querySelector('#m-pilar').value,
      objetivo:         overlay.querySelector('#m-objetivo').value,
      publico_alvo:     overlay.querySelector('#m-publico').value,
      dor:              overlay.querySelector('#m-dor').value,
      cta:              overlay.querySelector('#m-cta').value,

      estrutura_slides: overlay.querySelector('#m-slides').value,

      story_apoio:      overlay.querySelector('#m-story').value,

      checklist_done:   JSON.stringify(modalState.checklist),
      arquivos:         JSON.stringify(modalState.arquivos),
    };

    let error;
    if (isNew) {
      ({ error } = await sb.from('posts').insert(payload));
    } else {
      ({ error } = await sb.from('posts').update(payload).eq('id', post.id));
    }
    if (error) { showToast('Erro ao salvar: ' + error.message, 'error'); return; }
    overlay.remove();
    showToast(isNew ? 'Post criado!' : 'Alterações salvas!', 'success');
    await renderAll();
  });

  renderArquivosTab(overlay);
}

/* ───────────────────────── DASHBOARD ───────────────────────── */

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia';
  if (h < 18) return 'Boa tarde';
  return 'Boa noite';
}

function daysUntil(dateStr) {
  const today  = new Date(new Date().toISOString().slice(0,10) + 'T00:00:00');
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - today) / 86400000);
}

function getSmartInsights() {
  const today     = new Date().toISOString().slice(0,10);
  const now       = new Date();
  const published = STATE.allPosts.filter(p => p.status === 'publicado');

  const daysSince = {};
  PLANEJAMENTO.forEach(pl => {
    const last = published
      .filter(p => p.pilar === pl.pilar)
      .sort((a,b) => b.data.localeCompare(a.data))[0];
    if (!last) { daysSince[pl.pilar] = null; return; }
    const diff = new Date(today+'T00:00:00') - new Date(last.data+'T00:00:00');
    daysSince[pl.pilar] = Math.round(diff / 86400000);
  });

  const monthPosts = STATE.allPosts.filter(p => {
    const d = new Date(p.data+'T00:00:00');
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });

  const scores = PLANEJAMENTO.map(pl => {
    const monthCount = monthPosts.filter(p => p.pilar === pl.pilar).length;
    const deficit    = Math.max(0, pl.meta - monthCount);
    const days       = daysSince[pl.pilar] ?? 30;
    return { pilar:pl.pilar, deficit, days, monthCount, meta:pl.meta, pct:pl.pct, color:PILAR_COLOR[pl.pilar], score: deficit*3 + days*0.5 };
  }).sort((a,b) => b.score - a.score);

  const alerts = PLANEJAMENTO
    .map(pl => ({ pilar:pl.pilar, days:daysSince[pl.pilar] }))
    .filter(a => a.days === null || a.days >= 7);

  return { scores, alerts, daysSince };
}

function renderDashPost(post) {
  const color  = PILAR_COLOR[post.pilar] || '#c9a44a';
  const status = STATUSES.find(s => s.key === normStatus(post.status));
  const items  = getChecklist(post.formato || '');
  const done   = parseJSON(post.checklist_done, {});
  const doneN  = items.filter(i => done[i]).length;
  const pct    = items.length ? Math.round(doneN / items.length * 100) : 0;
  const clColor = pct === 100 ? '#6a9c5a' : '#c9a44a';
  return `<div class="dash-post" data-pid="${post.id}">
    <div style="position:absolute;left:0;top:6px;bottom:6px;width:4px;border-radius:0 3px 3px 0;background:${color}"></div>
    <div class="dash-post-title">${post.tema || 'Sem título'}</div>
    <div class="dash-post-meta">
      <span>${post.formato || ''}</span>
      ${post.horario ? `<span>🕐 ${fmtTime(post.horario)}</span>` : ''}
    </div>
    <span class="dash-post-status" style="background:${status?.color||color}22;color:${status?.color||color}">${status?.label || post.status}</span>
    ${items.length > 0 ? `<div style="margin-top:8px;display:flex;align-items:center;gap:8px">
      <div style="flex:1;height:3px;background:rgba(43,29,26,.1);border-radius:2px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${clColor};border-radius:2px"></div>
      </div>
      <span style="font-size:.57rem;font-weight:700;color:var(--ink-soft)">${doneN}/${items.length}</span>
    </div>` : ''}
  </div>`;
}

function highlight(text, query) {
  if (!text || !query) return text || '';
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

const SEARCH_FIELDS = ['tema','legenda','hashtags','objetivo','pilar','formato','cta','roteiro',
  'publico_alvo','dor','briefing_visual','story_apoio','observacoes','variacao_legenda',
  'estrutura_slides','texto_capa'];

function performSearch(query, posts) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase();
  return posts
    .filter(p => SEARCH_FIELDS.some(f => (p[f] || '').toLowerCase().includes(q)))
    .map(p => {
      const matchField = SEARCH_FIELDS.find(f => (p[f] || '').toLowerCase().includes(q));
      const raw = p[matchField] || '';
      const idx = raw.toLowerCase().indexOf(q);
      const start = Math.max(0, idx - 60);
      const end = Math.min(raw.length, idx + q.length + 80);
      const snippet = (start > 0 ? '…' : '') + raw.slice(start, end) + (end < raw.length ? '…' : '');
      return { post: p, snippet, matchField };
    });
}

function renderSearchView() {
  const wrap = document.getElementById('search-view');
  if (!wrap) return;

  wrap.innerHTML = `<div class="search-wrap">
    <div class="search-bar-wrap">
      <input type="text" class="search-input" id="search-input"
        placeholder="Buscar por título, legenda, hashtag, pilar, roteiro..."
        autocomplete="off">
    </div>
    <div class="search-filters">
      <button class="chip-filter active" data-sf="all">Todos os pilares</button>
      ${Object.keys(PILAR_COLOR).map(p => `<button class="chip-filter" data-sf="${p}">${p}</button>`).join('')}
    </div>
    <div id="search-results" class="search-results">
      <div class="search-empty">Digite para buscar entre ${STATE.allPosts.length} posts</div>
    </div>
  </div>`;

  let activePilar = 'all';

  const doSearch = () => {
    const query = wrap.querySelector('#search-input').value.trim();
    const resultsEl = wrap.querySelector('#search-results');
    let pool = activePilar === 'all' ? STATE.allPosts : STATE.allPosts.filter(p => p.pilar === activePilar);

    if (query.length < 2) {
      resultsEl.innerHTML = `<div class="search-empty">Digite para buscar entre ${pool.length} posts</div>`;
      return;
    }

    const matches = performSearch(query, pool);
    if (matches.length === 0) {
      resultsEl.innerHTML = `<div class="search-empty">Nenhum resultado para "<strong style="color:var(--cream)">${query}</strong>"</div>`;
      return;
    }

    resultsEl.innerHTML = `
      <div style="font-size:.7rem;color:rgba(253,248,243,.32);margin-bottom:14px;font-weight:700">
        ${matches.length} resultado${matches.length !== 1 ? 's' : ''} para "<span style="color:var(--cream)">${query}</span>"
      </div>
      ${matches.map(({ post:p, snippet }) => {
        const color  = PILAR_COLOR[p.pilar] || '#c9a44a';
        const status = STATUSES.find(s => s.key === normStatus(p.status));
        return `<div class="search-result" data-pid="${p.id}">
          <div class="search-result-title">${highlight(p.tema || 'Sem título', query)}</div>
          <div class="search-result-meta">
            <span style="color:${color};font-weight:700">${p.pilar || ''}</span>
            ${p.formato ? `<span>${p.formato}</span>` : ''}
            ${p.data ? `<span>${fmtDateBR(p.data)}</span>` : ''}
            ${status ? `<span style="color:${status.color}">${status.label}</span>` : ''}
          </div>
          ${snippet ? `<div class="search-result-snippet">${highlight(snippet, query)}</div>` : ''}
        </div>`;
      }).join('')}`;

    resultsEl.querySelectorAll('.search-result[data-pid]').forEach(el => {
      el.addEventListener('click', () => openModal(el.dataset.pid));
    });
  };

  wrap.querySelector('#search-input').addEventListener('input', doSearch);
  wrap.querySelectorAll('.chip-filter[data-sf]').forEach(btn => {
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.chip-filter[data-sf]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activePilar = btn.dataset.sf;
      doSearch();
    });
  });

  wrap.querySelector('#search-input').focus();
}

function renderMixStrip() {
  const strip = document.getElementById('mix-strip');
  if (!strip) return;
  const year = STATE.calYear;
  const month = STATE.calMonth;
  const monthStr = new Date(year, month, 1).toLocaleDateString('pt-BR', { month:'long', year:'numeric' });

  const monthPosts = STATE.posts.filter(p => {
    const d = new Date(p.data + 'T00:00:00');
    return d.getFullYear() === year && d.getMonth() === month;
  });

  const todayStr = new Date().toISOString().slice(0,10);
  const cardsHTML = PLANEJAMENTO.map(pl => {
    const color     = PILAR_COLOR[pl.pilar] || '#c9a44a';
    const planned   = monthPosts.filter(p => p.pilar === pl.pilar).length;
    const published = monthPosts.filter(p => p.pilar === pl.pilar && p.status === 'publicado').length;
    const barPct    = Math.min(100, Math.round((planned / pl.meta) * 100));
    let statusClass = 'under', statusText = 'nenhum planejado';
    if (planned >= pl.meta) { statusClass = 'ok'; statusText = '✓ meta atingida'; }
    else if (planned > 0) { statusClass = 'warn'; statusText = `${pl.meta - planned} ainda faltam`; }

    const lastPub = STATE.allPosts
      .filter(p => p.pilar === pl.pilar && p.status === 'publicado')
      .sort((a,b) => b.data.localeCompare(a.data))[0];
    let daysSinceClass = 'ok', daysSinceText = '';
    if (!lastPub) {
      daysSinceClass = 'late'; daysSinceText = 'Nunca publicado';
    } else {
      const d = Math.round((new Date(todayStr+'T00:00:00') - new Date(lastPub.data+'T00:00:00')) / 86400000);
      daysSinceText = d === 0 ? 'Publicado hoje' : d === 1 ? 'Publicado ontem' : `${d} dias sem publicar`;
      daysSinceClass = d >= 10 ? 'late' : d >= 5 ? 'warn' : 'ok';
    }

    return `<div class="mix-card">
      <div class="mix-card-top">
        <span class="mix-pilar-name" style="color:${color}">${pl.pilar}</span>
        <span class="mix-pct-badge">${pl.pct}% do mix</span>
      </div>
      <div class="mix-nums">
        <div class="mix-num"><div class="n">${planned}<sub>/${pl.meta}</sub></div><div class="l">planejados</div></div>
        <div class="mix-num"><div class="n">${published}</div><div class="l">publicados</div></div>
      </div>
      <div class="mix-bar-track"><div class="mix-bar-fill" style="width:${barPct}%;background:${color}"></div></div>
      <div class="mix-status ${statusClass}">${statusText}</div>
      <div class="mix-days-since ${daysSinceClass}">${daysSinceText}</div>
    </div>`;
  }).join('');

  strip.innerHTML = `
    <div class="mix-header">
      <span class="mix-title">Planejamento</span>
      <button class="mix-nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="mix-month-label">${monthStr.charAt(0).toUpperCase() + monthStr.slice(1)}</span>
      <button class="mix-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="mix-cards">${cardsHTML}</div>
  `;
}

/* ───────────────────────── CALENDÁRIO ───────────────────────── */

function renderCalendarView() {
  const wrap = document.getElementById('cal-wrap');
  if (!wrap) return;
  const year = STATE.calYear;
  const month = STATE.calMonth;
  const monthStr = new Date(year, month, 1).toLocaleDateString('pt-BR', { month:'long', year:'numeric' });
  const today = new Date();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const dowLabels = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  // Apenas posts prontos para agendar e publicados, todos os canais
  const calPosts = STATE.allPosts.filter(p => normStatus(p.status) === 'agendar' || p.status === 'publicado');

  const itemsByDate = {};
  calPosts.forEach(p => {
    if (!itemsByDate[p.data]) itemsByDate[p.data] = [];
    itemsByDate[p.data].push({ type:'post', post:p });
    if (p.story_apoio && p.story_apoio.trim()) {
      itemsByDate[p.data].push({ type:'story', post:p });
    }
  });

  let dayEls = [];
  for (let i = firstDow - 1; i >= 0; i--) {
    dayEls.push(`<div class="cal-day other-month"><div class="cal-day-num">${daysInPrev - i}</div></div>`);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const dayItems = itemsByDate[dateStr] || [];
    const maxShow = 3;
    const pills = dayItems.slice(0, maxShow).map(item => {
      const color = PILAR_COLOR[item.post.pilar] || '#c9a44a';
      if (item.type === 'story') {
        return `<div class="cal-post-pill cal-story-pill" style="background:${color}44;" data-pid="${item.post.id}">📱 story</div>`;
      }
      const pub = item.post.status === 'publicado';
      return `<div class="cal-post-pill" style="background:${color}${pub?'88':'cc'};" data-pid="${item.post.id}">${pub ? '✓ ' : ''}${item.post.tema}</div>`;
    }).join('');
    const more = dayItems.length > maxShow ? `<div class="cal-more">+${dayItems.length - maxShow} mais</div>` : '';
    dayEls.push(`<div class="cal-day${isToday?' today':''}" data-date="${dateStr}"><div class="cal-day-num">${d}</div>${pills}${more}</div>`);
  }
  const remaining = dayEls.length % 7 === 0 ? 0 : 7 - (dayEls.length % 7);
  for (let d = 1; d <= remaining; d++) {
    dayEls.push(`<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`);
  }

  wrap.innerHTML = `
    <div class="cal-wrap" style="padding:14px 34px 40px;">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹ anterior</button>
        <h3>${monthStr.charAt(0).toUpperCase() + monthStr.slice(1)}</h3>
        <button class="cal-nav-btn" onclick="changeMonth(1)">próximo ›</button>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(155,127,209,.8)"></div>Post pronto p/ agendar</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(155,127,209,.3);border:1px dashed rgba(255,255,255,.4)"></div>Story de apoio</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(106,156,90,.65)"></div>Publicado</div>
        <span class="cal-legend-note">Todos os canais · Pronto p/ agendar e Publicados</span>
      </div>
      <div class="cal-grid">
        ${dowLabels.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${dayEls.join('')}
      </div>
    </div>
  `;

  wrap.querySelectorAll('.cal-post-pill[data-pid]').forEach(pill => {
    const post = STATE.allPosts.find(p => String(p.id) === pill.dataset.pid);
    if (post) pill.addEventListener('click', () => openModal(post.id));
  });
  wrap.querySelectorAll('.cal-day[data-date]').forEach(day => {
    day.addEventListener('click', e => {
      if (e.target.closest('.cal-post-pill')) return;
      pendingNewPostDate = day.dataset.date;
      openModal(null);
    });
  });
}

function changeMonth(delta) {
  let m = STATE.calMonth + delta;
  let y = STATE.calYear;
  if (m < 0) { m = 11; y--; }
  if (m > 11) { m = 0; y++; }
  STATE.calMonth = m;
  STATE.calYear = y;
  if (STATE.view === 'kanban') renderMixStrip();
  if (STATE.view === 'calendar') renderCalendarView();
}

async function switchView(view) {
  STATE.view = view;
  await renderAll();
}

      <td style="font-weight:700">${pl.pct}%</td>
      <td>${pl.meta}</td>
      <td style="font-size:.72rem;color:rgba(253,248,243,.55)">${pl.desc}</td>
    </tr>`;
  }).join('');

  const { daysSince } = getSmartInsights();
  const funilCounts = { topo:0, meio:0, fundo:0 };
  all.forEach(p => { const f = FUNIL_MAP[p.pilar]; if (f) funilCounts[f]++; });
  const funilTotal = Math.max(1, funilCounts.topo + funilCounts.meio + funilCounts.fundo);
  const weeks = [3,2,1,0].map(i => {
    const eDate = new Date(); eDate.setDate(eDate.getDate() - i*7);
    const sDate = new Date(eDate); sDate.setDate(sDate.getDate() - 6);
    const count = all.filter(p => p.status==='publicado' && p.data>=sDate.toISOString().slice(0,10) && p.data<=eDate.toISOString().slice(0,10)).length;
    return { label: i===0?'Essa sem.':i===1?'Ant.':'-'+i+' sem.', count };
  });
  const maxWeek = Math.max(...weeks.map(w=>w.count), 1);
  const consistencyGrid = PLANEJAMENTO.map(pl => {
    const d = daysSince[pl.pilar];
    const c = d===null||d>=10 ? 'var(--terracota)' : d>=5 ? 'var(--gold)' : 'var(--green)';
    const pc = PILAR_COLOR[pl.pilar] || '#c9a44a';
    return `<div class="consistency-card"><div class="consistency-n" style="color:${c}">${d===null?'∞':d}</div><div class="consistency-label">dias sem publicar</div><div class="consistency-pilar" style="color:${pc}">${pl.pilar}</div></div>`;
  }).join('');
  const funilItems = [
    { key:'topo',  label:'Topo de funil',  sub:'Educação + Bastidores', color:'#9b7fd1' },
    { key:'meio',  label:'Meio de funil',   sub:'Prova Social',           color:'#5aa68f' },
    { key:'fundo', label:'Fundo de funil',  sub:'Venda Direta',           color:'#d4849a' },
  ].map(f => {
    const n = funilCounts[f.key]; const pct = Math.round(n/funilTotal*100);
    return `<div class="funil-item"><div class="funil-n" style="color:${f.color}">${n}</div><div class="funil-l">${f.label}</div><div class="funil-sub">${f.sub}</div><div class="funil-bar"><div class="funil-fill" style="width:${pct}%;background:${f.color}"></div></div></div>`;
  }).join('');
  const weekBars = weeks.map(w => {
    const h = Math.round(w.count/maxWeek*100);
    return `<div class="week-bar-wrap"><div class="week-bar-n">${w.count}</div><div class="week-bar" style="height:${h}%"></div><div class="week-bar-label">${w.label}</div></div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="rel-section">
      <div class="rel-section-title">Visão geral — todos os canais</div>
      <div class="rel-overview">
        <div class="rel-ov-item"><div class="rel-ov-n">${total}</div><div class="rel-ov-l">Total</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:var(--gold)">${totCriacao}</div><div class="rel-ov-l">Em criação</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:#9b7fd1">${totAgendar}</div><div class="rel-ov-l">Pronto p/ agendar</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:var(--rose)">${totAgendado}</div><div class="rel-ov-l">Agendados</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:var(--green)">${totPublicado}</div><div class="rel-ov-l">Publicados</div></div>
        <div class="rel-ov-item"><div class="rel-ov-n" style="color:var(--ink-faint)">${totReaproveitar}</div><div class="rel-ov-l">Reaproveitar</div></div>
      </div>
    </div>

    <div class="rel-section">
      <div class="rel-section-title">Consistência e frequência</div>
      <div class="consistency-grid">${consistencyGrid}</div>
      <div class="funil-row">${funilItems}</div>
      <div class="week-section">
        <div class="week-chart-title">Frequência de publicação — últimas 4 semanas</div>
        <div class="week-chart">${weekBars}</div>
      </div>
    </div>

    <div class="rel-section">
      <div class="rel-section-title">Desempenho por pilar</div>
      <div class="rel-pilar-grid">${cardsHTML}</div>
    </div>

    <div class="rel-section">
      <div class="rel-section-title">Matriz de pilares de conteúdo</div>
      <table class="rel-matrix-table">
        <thead><tr>
          <th>Pilar</th><th>% do mix</th><th>Meta mensal</th><th>Objetivo estratégico</th>
        </tr></thead>
        <tbody>${matrixRowsHTML}</tbody>
      </table>
    </div>

    <div class="rel-section">
      <div class="rel-section-title">Ritmo estratégico semanal</div>
      <div class="rhythm-row">
        <div class="rhythm-day">
          <div class="rhythm-dow">Segunda</div>
          <span class="rhythm-pilar-tag" style="background:#9b7fd1">Educação Profunda</span>
          <div class="rhythm-role">Abre a semana ensinando algo relevante</div>
          <div class="rhythm-logic">Atrai audiência fria, gera salvamentos e compartilhamentos — o combustível do alcance orgânico.</div>
        </div>
        <div class="rhythm-day">
          <div class="rhythm-dow">Terça</div>
          <span class="rhythm-pilar-tag" style="background:#9b7fd1">Educação Profunda</span>
          <div class="rhythm-role">Aprofunda ou complementa o tema de segunda</div>
          <div class="rhythm-logic">Quem salvou ontem volta pra ver mais. Você dobra a autoridade antes de qualquer CTA.</div>
        </div>
        <div class="rhythm-day optional">
          <div class="rhythm-dow">Quarta <span style="font-size:.55rem;opacity:.6">(quando existe)</span></div>
          <span class="rhythm-pilar-tag" style="background:#d18b5a">Bastidores</span>
          <div class="rhythm-role">Pilar de transição — humaniza a marca</div>
          <div class="rhythm-logic">Quebra o ritmo técnico, cria afinidade. Mantém quem já segue engajado sem forçar venda.</div>
        </div>
        <div class="rhythm-day">
          <div class="rhythm-dow">Quinta</div>
          <span class="rhythm-pilar-tag" style="background:#5aa68f">Prova Social</span>
          <div class="rhythm-role">Mostra resultado de quem já aplicou o conhecimento</div>
          <div class="rhythm-logic">A audiência foi educada nos dias anteriores. Agora vê prova de que funciona — fricção cai.</div>
        </div>
        <div class="rhythm-day">
          <div class="rhythm-dow">Sexta</div>
          <span class="rhythm-pilar-tag" style="background:#d4849a">Venda Direta</span>
          <div class="rhythm-role">Fecha a semana convertendo quem foi aquecido</div>
          <div class="rhythm-logic">O CTA chega depois de educar, provar e humanizar — a audiência já está convencida.</div>
        </div>
      </div>
      <div class="rhythm-mantra">Educação atrai · Prova converte · Bastidores retém</div>
    </div>
  `;
}

/* ───────────────────────── INIT ───────────────────────── */

if (initSupabase()) boot();
</script>
</body>
</html>
