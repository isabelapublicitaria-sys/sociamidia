<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Receitas Social</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #2b1d1a;
  --cream: #fdf8f3;
  --rose: #d4849a;
  --ink-faint: #a3938a;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Comfortaa',sans-serif; background:var(--bg); color:var(--cream);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background-image: radial-gradient(ellipse 70% 50% at 15% 0%, rgba(212,132,154,.10) 0%, transparent 60%);
}
.wrap { max-width:520px; width:100%; }
h1 { font-family:'Playfair Display',serif; font-style:italic; font-weight:600; font-size:2rem; color:var(--rose); margin-bottom:8px; }
.sub { font-size:.82rem; color:var(--ink-faint); margin-bottom:32px; letter-spacing:.3px; }
.cards { display:flex; flex-direction:column; gap:12px; }
a.card {
  display:flex; align-items:center; gap:14px; padding:18px 20px; border-radius:16px;
  background:rgba(253,248,243,.04); border:1px solid rgba(253,248,243,.1);
  text-decoration:none; color:var(--cream); transition:.2s;
}
a.card:hover { background:rgba(253,248,243,.08); border-color:rgba(253,248,243,.25); transform:translateY(-2px); }
.dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.name { font-weight:700; font-size:1rem; }
.arrow { margin-left:auto; opacity:.5; font-size:1.1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Caderno social</h1>
  <div class="sub">Escolha o cliente para abrir o calendário de conteúdo</div>
  <div class="cards">
    <a class="card" href="gestta.html">
      <span class="dot" style="background:#d4849a"></span>
      <span class="name">Gestta</span>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="guiavitta.html">
      <span class="dot" style="background:#0d3b66"></span>
      <span class="name">Guia Vitta</span>
      <span class="arrow">→</span>
    </a>
  </div>
</div>
</body>
</html>
